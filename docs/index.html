<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道歉程序 💔</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 48px 40px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(233,30,99,0.12), 0 8px 24px rgba(0,0,0,0.06);
    text-align: center;
    position: relative;
    transition: all 0.5s ease;
  }

  .card.forgiven { transform: scale(1.02); }

  .emoji-box {
    font-size: 80px;
    margin-bottom: 16px;
    line-height: 1.2;
    transition: transform 0.3s ease;
  }
  .emoji-box:hover { transform: scale(1.1) rotate(-5deg); }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #d81b60;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .subtitle {
    color: #ad1457;
    font-size: 14px;
    margin-bottom: 28px;
    opacity: 0.7;
  }

  .message-area { margin-bottom: 24px; }

  textarea {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #f8bbd0;
    border-radius: 16px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.3s;
    background: rgba(255,255,255,0.6);
    outline: none;
    color: #333;
  }
  textarea:focus { border-color: #e91e63; box-shadow: 0 0 0 4px rgba(233,30,99,0.1); }
  textarea::placeholder { color: #b0bec5; }

  .btn-wrap {
    position: relative;
    height: 54px;
    margin-bottom: 16px;
  }

  .btn-forgive {
    padding: 14px 40px;
    background: linear-gradient(135deg, #e91e63, #d81b60);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233,30,99,0.3);
    transition: transform 0.08s ease, box-shadow 0.2s;
    white-space: nowrap;
    user-select: none;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    letter-spacing: 2px;
  }
  .btn-forgive:hover { box-shadow: 0 8px 28px rgba(233,30,99,0.4); }
  .btn-forgive:active { transform: translate(-50%, -50%) scale(0.95); }

  .attempt-info {
    font-size: 13px;
    color: #9e9e9e;
    min-height: 20px;
    margin-bottom: 8px;
    transition: color 0.3s;
  }
  .attempt-info.many { color: #e91e63; font-weight: 600; }

  .hint-text {
    font-size: 13px;
    color: #bdbdbd;
    margin-top: 8px;
  }

  /* ── Forgiven state ── */
  .forgiven-state {
    display: none;
    animation: fadeInUp 0.6s ease forwards;
  }
  .card.forgiven .initial-state { display: none; }
  .card.forgiven .forgiven-state { display: block; }

  .forgiven-msg {
    font-size: 24px;
    color: #d81b60;
    font-weight: 700;
    margin: 12px 0 8px;
  }

  .forgiven-reply {
    background: #fce4ec;
    border-radius: 16px;
    padding: 16px;
    margin: 16px 0;
    color: #880e4f;
    font-size: 15px;
    line-height: 1.6;
    text-align: left;
  }
  .forgiven-reply strong { color: #d81b60; }

  .btn-restart {
    padding: 12px 32px;
    background: transparent;
    border: 2px solid #e91e63;
    color: #e91e63;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-restart:hover { background: #e91e63; color: #fff; }

  .hearts-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .emoji-box { animation: float 3s ease-in-out infinite; }

  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
    h1 { font-size: 22px; }
    .emoji-box { font-size: 60px; }
    .btn-forgive { font-size: 16px; padding: 12px 28px; }
  }
</style>
</head>
<body>

<canvas class="hearts-canvas" id="heartsCanvas"></canvas>

<div class="card" id="card">

  <!-- ═══ 初始状态 ═══ -->
  <div class="initial-state">
    <div class="emoji-box" id="mainEmoji">😢</div>
    <h1>我错了，能见见面吗？</h1>
    <p class="subtitle">我知道错了，给我一次机会好不好...</p>

    <div class="message-area">
      <textarea id="messageInput" placeholder="写下你想说的话… 比如：我再也不惹你生气了 😭">我再也不惹你生气了 😭</textarea>
    </div>

    <div class="btn-wrap" id="btnWrap">
      <button class="btn-forgive" id="forgiveBtn">原谅我吧 🙏</button>
    </div>

    <div class="attempt-info" id="attemptInfo"></div>
    <p class="hint-text" id="hintText">（按钮好像有点不听话...）</p>
  </div>

  <!-- ═══ 原谅后状态 ═══ -->
  <div class="forgiven-state">
    <div class="emoji-box">😊</div>
    <div class="forgiven-msg">没关系，我原谅你啦 ❤️</div>
    <div class="forgiven-reply">
      <strong>你的道歉：</strong><br>
      <span id="displayMessage">我错了，能见见面吗？</span><br><br>
      <span style="color:#ad1457;font-size:14px;">💖 原谅你了，要说到做到哦~</span>
    </div>
    <button class="btn-restart" onclick="resetAll()">💫 再来一次</button>
  </div>

</div>

<script>
// ─── Config ───
const APOLOGY_TEXT = '我错了，能见见面吗？';
let attempts = 0;
let isForgiven = false;
let particles = [];
let animFrame = null;

// ─── DOM refs ───
const card = document.getElementById('card');
const btn = document.getElementById('forgiveBtn');
const btnWrap = document.getElementById('btnWrap');
const attemptInfo = document.getElementById('attemptInfo');
const hintText = document.getElementById('hintText');
const mainEmoji = document.getElementById('mainEmoji');
const messageInput = document.getElementById('messageInput');
const displayMessage = document.getElementById('displayMessage');
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');

// ─── Resize canvas ───
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Runaway button logic ───
const ESCAPE_PADDING = 20;

function getBtnRect() {
  return btn.getBoundingClientRect();
}

function escapeFromCursor(e) {
  if (isForgiven) return;

  attempts++;
  const bRect = getBtnRect();
  const wrapRect = btnWrap.getBoundingClientRect();

  // Calculate safe area
  const maxX = window.innerWidth - bRect.width - ESCAPE_PADDING;
  const maxY = window.innerHeight - bRect.height - ESCAPE_PADDING;

  // Generate position far from cursor
  let x, y, dist;
  let tries = 0;
  do {
    x = ESCAPE_PADDING + Math.random() * (maxX - ESCAPE_PADDING);
    y = ESCAPE_PADDING + Math.random() * (maxY - ESCAPE_PADDING);
    dist = Math.hypot(x - e.clientX, y - e.clientY);
    tries++;
  } while (dist < 150 && tries < 30);

  // Clamp to viewport
  x = Math.max(ESCAPE_PADDING, Math.min(x, maxX));
  y = Math.max(ESCAPE_PADDING, Math.min(y, maxY));

  btn.style.position = 'fixed';
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
  btn.style.zIndex = '50';
  btn.style.transform = 'none';

  // Update feedback
  updateAttemptFeedback();

  // Change emoji based on attempts
  if (attempts >= 10) mainEmoji.textContent = '😭';
  else if (attempts >= 5) mainEmoji.textContent = '😰';

  // Special messages
  if (attempts === 3) hintText.textContent = '诶！别跑！我是来道歉的！';
  else if (attempts === 6) hintText.textContent = '你追不上我哈哈哈 😂';
  else if (attempts === 9) hintText.textContent = '呜呜 你让我点一下好不好 😭';
  else if (attempts === 12) hintText.textContent = '… 你赢了 😅';
  else if (attempts === 15) {
    hintText.textContent = '好吧，这次我不跑了 💝';
    // Final mercy - let them click
    setTimeout(() => {
      btn.style.position = 'absolute';
      btn.style.left = '50%';
      btn.style.top = '50%';
      btn.style.transform = 'translate(-50%, -50%)';
      btn.style.zIndex = '1';
      attemptInfo.textContent = '😌 给你点了... 点我吧';
      btn.style.pointerEvents = 'auto';
    }, 500);
  }
}

function updateAttemptFeedback() {
  if (attempts >= 15) {
    attemptInfo.textContent = `追了我 ${attempts} 次... 你真执着 😅`;
    attemptInfo.className = 'attempt-info many';
  } else if (attempts >= 10) {
    attemptInfo.textContent = `已经跑了 ${attempts} 次了！放过我吧 😭`;
    attemptInfo.className = 'attempt-info many';
  } else if (attempts >= 5) {
    attemptInfo.textContent = `躲开 ${attempts} 次了 😰`;
    attemptInfo.className = 'attempt-info';
  } else if (attempts > 0) {
    attemptInfo.textContent = `哼 躲开 ${attempts} 次了 😤`;
    attemptInfo.className = 'attempt-info';
  }
}

btn.addEventListener('mouseover', escapeFromCursor);
btn.addEventListener('touchstart', (e) => {
  if (isForgiven) return;
  e.preventDefault();
  const touch = e.touches[0];
  escapeFromCursor({ clientX: touch.clientX, clientY: touch.clientY });
}, { passive: false });

// Click forgiveness - only works when button stops running
btn.addEventListener('click', () => {
  if (isForgiven) return;
  // Only forgive if button is back in place (after 15 attempts mercy)
  // OR if user is fast enough to click before escape
  // Allow forgiveness any time with low probability based on attempts
  const forgiveChance = attempts >= 15 ? 1.0 : (attempts >= 10 ? 0.5 : 0.05);
  if (Math.random() < forgiveChance || attempts >= 15) {
    doForgive();
  } else {
    // Escape anyway
    const fakeEvent = { clientX: Math.random() * window.innerWidth, clientY: Math.random() * window.innerHeight };
    escapeFromCursor(fakeEvent);
    if (attempts < 15) {
      hintText.textContent = '嘿嘿 点不到 😜';
    }
  }
});

// ─── Forgiveness ───
function doForgive() {
  if (isForgiven) return;
  isForgiven = true;

  const message = messageInput.value.trim() || '我错了，能见见面吗？';
  displayMessage.textContent = message;

  btn.style.position = 'absolute';
  btn.style.left = '50%';
  btn.style.top = '50%';
  btn.style.transform = 'translate(-50%, -50%)';

  card.classList.add('forgiven');
  attemptInfo.textContent = '';
  hintText.textContent = '';
  mainEmoji.textContent = '😊';

  // Launch heart particles
  launchHearts();

  // Try API call (non-blocking)
  fetch('/api/forgive', { method: 'POST' }).catch(() => {});
}

// ─── Heart particles ───
const HEART_EMOJIS = ['❤️', '💖', '💗', '💝', '✨', '🌸', '🎉'];

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = 16 + Math.random() * 20;
    this.speedY = -2 - Math.random() * 3;
    this.speedX = (Math.random() - 0.5) * 3;
    this.opacity = 1;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.1;
    this.emoji = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
    this.drift = Math.random() * 2;
    this.driftSpeed = 0.02 + Math.random() * 0.03;
    this.driftOffset = Math.random() * Math.PI * 2;
  }

  update() {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.driftOffset) * this.drift;
    this.driftOffset += this.driftSpeed;
    this.opacity -= 0.008;
    this.rotation += this.rotSpeed;
    return this.opacity > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.opacity);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.font = `${this.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, 0, 0);
    ctx.restore();
  }
}

function launchHearts() {
  // Spawn multiple bursts
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  for (let burst = 0; burst < 5; burst++) {
    setTimeout(() => {
      for (let i = 0; i < 12; i++) {
        const x = centerX + (Math.random() - 0.5) * 200;
        const y = centerY + (Math.random() - 0.5) * 200;
        particles.push(new Particle(x, y));
      }
    }, burst * 300);
  }

  // Continuous gentle hearts
  let count = 0;
  const interval = setInterval(() => {
    if (count++ > 20) { clearInterval(interval); return; }
    const x = Math.random() * window.innerWidth;
    const y = window.innerHeight + 20;
    particles.push(new Particle(x, y));
  }, 400);

  if (!animFrame) animateParticles();
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.update());
  particles.forEach(p => p.draw(ctx));
  if (particles.length > 0) {
    animFrame = requestAnimationFrame(animateParticles);
  } else {
    animFrame = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ─── Reset ───
function resetAll() {
  isForgiven = false;
  attempts = 0;
  card.classList.remove('forgiven');
  attemptInfo.textContent = '';
  attemptInfo.className = 'attempt-info';
  hintText.textContent = '（按钮好像有点不听话...）';
  mainEmoji.textContent = '😢';
  messageInput.value = '我再也不惹你生气了 😭';

  btn.style.position = 'absolute';
  btn.style.left = '50%';
  btn.style.top = '50%';
  btn.style.transform = 'translate(-50%, -50%)';
  btn.style.pointerEvents = 'auto';

  particles = [];
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ─── Console easter egg ───
console.log('%c💔 对不起，我错了...', 'font-size:24px; color:#e91e63;');
console.log('%c能见见面吗？', 'font-size:18px; color:#ad1457;');
</script>
</body>
</html>
